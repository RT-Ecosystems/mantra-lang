name: build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++

      - name: Build
        run: |
          mkdir -p build
          cd build
          cmake ..
          make

      - name: Run example
        run: |
          cp build/bin/mantra ./mantra
          output=$(./mantra examples/namaste.mtr)
          echo "$output"
          if [ "$output" != "Namaste Duniya!" ]; then
            echo "Unexpected output: $output"
            exit 1
          fi
