<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" rx="80" fill="#05161A" />
  <defs>
    <!-- Gradients -->
    <linearGradient id="chakra" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C9FF" />
      <stop offset="100%" stop-color="#92FE9D" />
    </linearGradient>
    <linearGradient id="orangeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B00" />
      <stop offset="100%" stop-color="#FFA500" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Digital Chakra -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="url(#chakra)" stroke-width="3" stroke-dasharray="8 20" stroke-linecap="round" />
  <circle cx="200" cy="200" r="110" fill="none" stroke="url(#chakra)" stroke-width="6" stroke-dasharray="30 15" />

  <!-- 8 Geometric Lotus Petals -->
  <g fill="none" stroke="url(#chakra)" stroke-width="2" opacity="0.6">
    <path d="M 200 90 L 220 145 L 200 200 L 180 145 Z" />
    <path d="M 200 310 L 220 255 L 200 200 L 180 255 Z" />
    <path d="M 90 200 L 145 180 L 200 200 L 145 220 Z" />
    <path d="M 310 200 L 255 180 L 200 200 L 255 220 Z" />
    
    <path d="M 122 122 L 165 150 L 200 200 L 150 165 Z" />
    <path d="M 278 278 L 235 250 L 200 200 L 250 235 Z" />
    <path d="M 278 122 L 235 150 L 200 200 L 250 165 Z" />
    <path d="M 122 278 L 165 250 L 200 200 L 150 235 Z" />
  </g>

  <!-- Bold Tantric Triangles (Shatkona) -->
  <polygon points="200,120 130,240 270,240" fill="none" stroke="white" stroke-width="8" stroke-linejoin="round" filter="url(#glow)"/>
  <polygon points="200,280 130,160 270,160" fill="none" stroke="white" stroke-width="8" stroke-linejoin="round" filter="url(#glow)"/>
  
  <!-- Central Energy Core -->
  <circle cx="200" cy="200" r="14" fill="url(#orangeGlow)" filter="url(#glow)" />
</svg>
